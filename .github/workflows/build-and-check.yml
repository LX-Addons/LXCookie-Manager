name: 构建与检查浏览器扩展

on:
  push:
    branches: [main, beta, release]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      create_release:
        description: "创建发布版本"
        required: false
        default: false
        type: boolean
      skip_tests:
        description: "跳过 E2E 测试（加快构建速度）"
        required: false
        default: false
        type: boolean
      clear_caches:
        description: "清除旧的 npm 和 WXT 缓存后再构建"
        required: false
        default: false
        type: boolean

permissions:
  actions: write
  contents: write
  pull-requests: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || !contains(fromJSON('["main", "beta", "release"]'), github.ref_name) }}

env:
  NODE_VERSION: "22"
  EXTENSION_SIZE_LIMIT_MB: 10

jobs:
  setup:
    name: 准备环境
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      cache_key: ${{ steps.cache-key.outputs.key }}
      artifact_retention: ${{ steps.retention.outputs.days }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v5

      - name: 生成缓存 key
        id: cache-key
        run: |
          CACHE_KEY="${{ runner.os }}-${{ github.ref_name }}-node-${{ hashFiles('**/package-lock.json') }}"
          echo "key=$CACHE_KEY" >> $GITHUB_OUTPUT
          echo "📁 缓存 Key: $CACHE_KEY"

      - name: 设置产物保留天数
        id: retention
        run: |
          if [[ "${{ github.ref_name }}" == "main" || "${{ github.ref_name }}" == "beta" || "${{ github.ref_name }}" == "release" ]]; then
            echo "days=30" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "days=14" >> $GITHUB_OUTPUT
          else
            echo "days=7" >> $GITHUB_OUTPUT
          fi

      - name: 清除当前分支旧缓存
        if: ${{ github.event.inputs.clear_caches == 'true' || github.event_name == 'push' }}
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branchPrefix = '${{ github.ref_name }}'.replace(/[^a-zA-Z0-9-]/g, '-');
            const prefixes = [
              '${{ runner.os }}-' + branchPrefix + '-node-',
              '${{ runner.os }}-' + branchPrefix + '-wxt-'
            ];
            let cachesCleared = 0;

            console.log('🔍 正在清除当前分支相关缓存...');
            console.log('分支前缀: ' + branchPrefix);

            for (const prefix of prefixes) {
              let page = 1;
              const perPage = 100;
              
              while (true) {
                const { data: { actions_caches: caches } } = await github.rest.actions.getActionsCacheList({
                  owner,
                  repo,
                  per_page: perPage,
                  page: page
                });
                
                if (!caches || caches.length === 0) break;
                
                for (const cache of caches) {
                  if (cache.key.startsWith(prefix)) {
                    console.log(`🗑️ 删除缓存: ${cache.key}`);
                    try {
                      await github.rest.actions.deleteActionsCacheById({
                        owner,
                        repo,
                        cache_id: cache.id
                      });
                      cachesCleared++;
                    } catch (error) {
                      console.error(`❌ 删除失败: ${error.message}`);
                    }
                  }
                }
                
                if (caches.length < perPage) break;
                page++;
              }
            }

            console.log(`\n✅ 成功清除 ${cachesCleared} 个缓存`);

      - name: 输出准备摘要
        run: |
          echo "## 🚀 环境准备完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 配置项 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **分支** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **事件类型** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **缓存 Key** | \`${{ steps.cache-key.outputs.key }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **产物保留** | ${{ steps.retention.outputs.days }} 天 |" >> $GITHUB_STEP_SUMMARY

  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup]
    steps:
      - name: 检出仓库
        uses: actions/checkout@v5

      - name: 配置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 缓存 node_modules
        uses: actions/cache@v5
        id: npm-cache
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ needs.setup.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref_name }}-node-
            ${{ runner.os }}-node-

      - name: 安装依赖
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: TypeScript 类型检查
        run: npx tsc --noEmit

      - name: ESLint 代码检查
        run: npm run lint

      - name: Prettier 格式检查
        run: npm run format:check

      - name: 输出检查摘要
        if: always()
        run: |
          echo "## 🔍 代码检查结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 检查项 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :---: |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript 类型检查 | ✅ 通过 |" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint 代码检查 | ✅ 通过 |" >> $GITHUB_STEP_SUMMARY
          echo "| Prettier 格式检查 | ✅ 通过 |" >> $GITHUB_STEP_SUMMARY

  test:
    name: 单元测试
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup]
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - name: 检出仓库
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 配置 Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: 缓存 node_modules
        uses: actions/cache@v5
        id: npm-cache
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-${{ github.ref_name }}-node${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref_name }}-node${{ matrix.node-version }}-
            ${{ runner.os }}-node${{ matrix.node-version }}-
            ${{ runner.os }}-node-

      - name: 安装依赖
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: 运行单元测试并生成覆盖率报告
        run: npm run test:coverage

      - name: 上传覆盖率到 Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: 安全扫描
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup]
    steps:
      - name: 检出仓库
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 配置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 缓存 node_modules
        uses: actions/cache@v5
        id: npm-cache
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ needs.setup.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref_name }}-node-
            ${{ runner.os }}-node-

      - name: 安装依赖
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: 检查密钥泄露
        uses: trufflesecurity/trufflehog@v3.88.25
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

      - name: 依赖安全审计
        id: audit
        run: |
          echo "### 🛡️ 依赖安全审计" >> $GITHUB_STEP_SUMMARY

          AUDIT_OUTPUT=$(npm audit --audit-level=moderate 2>&1) || true

          echo "<details><summary>点击查看完整审计报告</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$AUDIT_OUTPUT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

          if echo "$AUDIT_OUTPUT" | grep -q "found 0 vulnerabilities"; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ 未发现安全漏洞" >> $GITHUB_STEP_SUMMARY
            echo "audit_status=clean" >> $GITHUB_OUTPUT
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **发现安全漏洞！** 请查看上方审计报告并修复。" >> $GITHUB_STEP_SUMMARY
            echo "audit_status=warning" >> $GITHUB_OUTPUT
          fi

      - name: 安全模式检查
        run: |
          echo "### 🔍 安全模式检查" >> $GITHUB_STEP_SUMMARY
          EXIT_CODE=0

          echo "#### eval 使用检查" >> $GITHUB_STEP_SUMMARY
          if grep -r "eval(" --include="*.ts" --include="*.tsx" --include="*.js" . 2>/dev/null | grep -v node_modules | grep -v ".wxt"; then
            echo "❌ 发现 eval() 使用 - 潜在安全风险" >> $GITHUB_STEP_SUMMARY
            EXIT_CODE=1
          else
            echo "✅ 未发现 eval() 使用" >> $GITHUB_STEP_SUMMARY
          fi

          echo "#### dangerouslySetInnerHTML 检查" >> $GITHUB_STEP_SUMMARY
          if grep -r "dangerouslySetInnerHTML" --include="*.ts" --include="*.tsx" --include="*.js" . 2>/dev/null | grep -v node_modules | grep -v ".wxt"; then
            echo "⚠️ 发现 dangerouslySetInnerHTML 使用 - XSS 风险" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ 未发现 dangerouslySetInnerHTML 使用" >> $GITHUB_STEP_SUMMARY
          fi

          exit $EXIT_CODE

  build:
    name: 构建扩展
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [setup, lint, test]
    if: needs.lint.result == 'success' && needs.test.result == 'success'
    outputs:
      version: ${{ steps.version.outputs.version }}
      name: ${{ steps.version.outputs.name }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v5

      - name: 配置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 缓存 node_modules
        uses: actions/cache@v5
        id: npm-cache
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ needs.setup.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref_name }}-node-
            ${{ runner.os }}-node-

      - name: 安装依赖
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: 缓存 WXT 构建缓存
        uses: actions/cache@v5
        with:
          path: .wxt
          key: ${{ runner.os }}-${{ github.ref_name }}-wxt-${{ hashFiles('**/package-lock.json', 'entrypoints/**/*', 'components/**/*', 'hooks/**/*', 'lib/**/*', 'i18n/**/*', 'utils/**/*', 'types/**/*', 'wxt.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref_name }}-wxt-
            ${{ runner.os }}-wxt-

      - name: 构建扩展
        run: |
          set -e
          echo "🔨 开始构建..."
          npm run build 2>&1
          echo "✅ 构建命令完成"

          echo "📁 构建后检查 .output/ 目录:"
          if [ -d ".output" ]; then
            ls -la .output/
          else
            echo "❌ .output/ 目录不存在"
            echo "📁 当前目录内容:"
            ls -la
            exit 1
          fi

      - name: 获取版本信息
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          NAME=$(jq -r '.name' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: 检查扩展体积
        run: |
          BUILD_DIR=".output/chrome-mv3"
          if [ ! -d "$BUILD_DIR" ]; then
            echo "❌ 构建目录不存在: $BUILD_DIR"
            echo "📁 当前目录内容:"
            ls -la
            echo "📁 .output/ 目录内容:"
            ls -la .output/ 2>/dev/null || echo ".output/ 目录不存在"
            exit 1
          fi

          SIZE_KB=$(du -sk "$BUILD_DIR" | cut -f1)
          SIZE_MB=$((SIZE_KB / 1024))
          echo "📊 扩展体积: ${SIZE_MB}MB (${SIZE_KB}KB)"

          if [ "$SIZE_MB" -gt "${{ env.EXTENSION_SIZE_LIMIT_MB }}" ]; then
            echo "❌ 扩展体积 (${SIZE_MB}MB) 超出限制 (${{ env.EXTENSION_SIZE_LIMIT_MB }}MB)"
            exit 1
          fi
          echo "✅ 扩展体积符合限制"

      - name: 验证构建产物
        run: |
          BUILD_DIR=".output/chrome-mv3"

          if [ ! -d "$BUILD_DIR" ]; then
            echo "❌ 构建目录不存在: $BUILD_DIR"
            exit 1
          fi

          echo "📁 构建内容:"
          ls -la "$BUILD_DIR"

          REQUIRED_FILES=("manifest.json" "popup.html")
          for file in "${REQUIRED_FILES[@]}"; do
            if [ -f "$BUILD_DIR/$file" ]; then
              echo "✅ $file 存在"
            else
              echo "❌ $file 缺失"
              exit 1
            fi
          done

          if [ -f "$BUILD_DIR/manifest.json" ]; then
            echo "📄 Manifest 内容:"
            jq '.' "$BUILD_DIR/manifest.json"
          fi

      - name: 打包扩展
        run: |
          echo "📁 打包前 .output/ 目录内容:"
          ls -la .output/

          npm run zip

          echo "📁 打包后 .output/ 目录内容:"
          ls -la .output/

      - name: 上传构建产物
        uses: actions/upload-artifact@v6
        with:
          name: extension-build
          path: .output/chrome-mv3/
          retention-days: ${{ needs.setup.outputs.artifact_retention }}
          if-no-files-found: error

      - name: 输出构建摘要
        run: |
          echo "## 📦 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **版本** | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **名称** | \`${{ steps.version.outputs.name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **产物保留** | ${{ needs.setup.outputs.artifact_retention }} 天 |" >> $GITHUB_STEP_SUMMARY

  e2e:
    name: E2E测试
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup, build]
    if: always() && needs.build.result == 'success' && github.event.inputs.skip_tests != 'true'
    steps:
      - name: 检出仓库
        uses: actions/checkout@v5

      - name: 配置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 缓存 node_modules
        uses: actions/cache@v5
        id: npm-cache
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ needs.setup.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-${{ github.ref_name }}-node-
            ${{ runner.os }}-node-

      - name: 安装依赖
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: 列出可用 Artifacts
        run: |
          echo "📦 尝试下载 artifact: extension-build"
          echo "🔍 工作流运行 ID: ${{ github.run_id }}"

      - name: 下载构建产物
        uses: actions/download-artifact@v7
        with:
          name: extension-build
          path: .output/

      - name: 准备测试扩展
        run: |
          echo "📁 当前目录内容:"
          ls -la

          echo "📁 .output/ 目录内容:"
          ls -la .output/ || echo "目录为空或不存在"

          if [ -d ".output" ] && [ -f ".output/manifest.json" ]; then
            echo "✅ 找到 manifest.json 在 .output/ 根目录"
            SOURCE_DIR=".output"
          elif [ -d ".output/chrome-mv3" ]; then
            echo "✅ 找到构建目录: .output/chrome-mv3"
            SOURCE_DIR=".output/chrome-mv3"
          else
            echo "❌ 未找到构建产物，检查所有目录..."
            find . -name "manifest.json" -type f 2>/dev/null | head -5
            echo "📁 当前目录完整内容:"
            ls -laR
            exit 1
          fi

          mkdir -p build/chrome-mv3-prod
          cp -r "$SOURCE_DIR"/* build/chrome-mv3-prod/

          echo "📁 最终 build/chrome-mv3-prod/ 目录内容:"
          ls -la build/chrome-mv3-prod/

      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps chromium

      - name: 运行 E2E 测试
        run: xvfb-run --auto-servernum npm run test:e2e

      - name: 上传 Playwright 报告
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: ${{ needs.setup.outputs.artifact_retention }}

  pr-comment:
    name: PR评论
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [setup, lint, test, security, build, e2e]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: 检出仓库
        uses: actions/checkout@v5

      - name: 获取版本信息
        id: info
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 检查是否为 Dependabot PR
        id: dependabot
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            echo "is_dependabot=true" >> $GITHUB_OUTPUT
          else
            echo "is_dependabot=false" >> $GITHUB_OUTPUT
          fi

      - name: 创建 PR 评论
        uses: actions/github-script@v8
        with:
          script: |
            const setupResult = '${{ needs.setup.result }}';
            const lintResult = '${{ needs.lint.result }}';
            const testResult = '${{ needs.test.result }}';
            const securityResult = '${{ needs.security.result }}';
            const buildResult = '${{ needs.build.result }}';
            const e2eResult = '${{ needs.e2e.result }}';
            const version = '${{ steps.info.outputs.version }}';
            const isDependabot = '${{ steps.dependabot.outputs.is_dependabot }}' === 'true';

            const statusEmoji = (result) => {
              if (result === 'success') return '✅';
              if (result === 'failure') return '❌';
              if (result === 'skipped') return '⏭️';
              return '⚠️';
            };

            const statusColor = (result) => {
              if (result === 'success') return 'brightgreen';
              if (result === 'failure') return 'red';
              return 'yellow';
            };

            const getBadge = (label, result) => {
              const color = statusColor(result);
              return `![${label}](https://img.shields.io/badge/${encodeURIComponent(label)}-${result}-${color}?style=flat-square)`;
            };

            let body = `## 🛠️ 扩展构建仪表盘\n\n`;
            body += `> **版本:** \`${version}\` | **分支:** \`${{ github.ref_name }}\` | **运行 ID:** [#${{ github.run_number }}](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})\n\n`;

            body += `### 📊 检查结果概览\n\n`;
            body += `| 阶段 | 检查项 | 状态 | 说明 |\n`;
            body += `| :---: | :--- | :---: | :--- |\n`;
            body += `| 🚀 | **环境准备** | ${statusEmoji(setupResult)} | 缓存与产物配置 |\n`;
            body += `| 🔍 | **代码检查** | ${statusEmoji(lintResult)} | TypeScript + ESLint + Prettier |\n`;
            body += `| 🧪 | **单元测试** | ${statusEmoji(testResult)} | Node.js 20/22/24 多版本测试 |\n`;
            body += `| 🛡️ | **安全扫描** | ${statusEmoji(securityResult)} | 密钥泄露 + 依赖审计 |\n`;
            body += `| 📦 | **扩展构建** | ${statusEmoji(buildResult)} | WXT 生产构建 |\n`;
            body += `| 🎭 | **E2E 测试** | ${statusEmoji(e2eResult)} | Playwright 浏览器测试 |\n\n`;

            body += `### 🏷️ 状态徽章\n\n`;
            body += `${getBadge('代码检查', lintResult)} ${getBadge('单元测试', testResult)} ${getBadge('安全扫描', securityResult)} ${getBadge('构建', buildResult)} ${getBadge('E2E测试', e2eResult)}\n\n`;

            const results = {
              lint: lintResult,
              test: testResult,
              security: securityResult,
              build: buildResult
            };

            const allSuccess = ['lint', 'test', 'security', 'build'].every(r => 
              results[r] === 'success' || results[r] === 'skipped'
            );
            const e2eSuccess = e2eResult === 'success' || e2eResult === 'skipped';

            if (allSuccess && e2eSuccess) {
              body += `> 🎉 **所有检查已通过！** 代码已准备好合并。\n\n`;
            } else {
              body += `> ⚠️ **部分检查未通过**，请查看上方详情或检查日志。\n\n`;
            }

            if (buildResult === 'success') {
              body += `---\n\n`;
              body += `### 📥 下载构建产物\n\n`;
              body += `构建产物可在 [工作流运行页面](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) 的 **Artifacts** 区域下载。\n\n`;
            }

            if (isDependabot) {
              body += `---\n\n`;
              body += `### 🤖 Dependabot 依赖更新\n\n`;
              if (allSuccess && e2eSuccess) {
                body += `✅ 所有关键检查已通过，已添加 \`待审核\` 标签。\n\n`;
                body += `⚠️ **需要人工审核后才能合并到主分支！**\n`;
              } else {
                body += `⚠️ 部分检查未通过，需要人工审核。\n`;
              }
            }

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  notify-failure:
    name: 失败通知
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [setup, lint, test, security, build, e2e]
    if: failure() && github.event_name != 'pull_request'
    steps:
      - name: 创建失败摘要
        run: |
          echo "## ❌ 构建失败" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 阶段 | 任务 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "| :---: | :--- | :---: |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 | 环境准备 | ${{ needs.setup.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 | 代码检查 | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 | 单元测试 | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛡️ | 安全扫描 | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 | 构建 | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎭 | E2E 测试 | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "请查看 [工作流日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) 了解详情。" >> $GITHUB_STEP_SUMMARY

  release:
    name: 创建发布
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup, build, e2e, security]
    if: |
      needs.build.result == 'success' &&
      (needs.e2e.result == 'success' || needs.e2e.result == 'skipped') &&
      needs.security.result == 'success' &&
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.create_release == 'true'
    steps:
      - name: 检出仓库
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 获取版本信息
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          NAME=$(jq -r '.name' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: 下载构建产物
        uses: actions/download-artifact@v7
        with:
          name: extension-build
          path: .output/
          merge-multiple: true

      - name: 生成更新日志
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          CURRENT_VERSION="${{ steps.version.outputs.version }}"

          if [ -z "$PREVIOUS_TAG" ]; then
            NOTES=$(npx git-cliff --strip header 2>/dev/null || echo "初始发布 v${CURRENT_VERSION}")
          else
            NOTES=$(npx git-cliff "${PREVIOUS_TAG}..HEAD" --strip header 2>/dev/null || echo "发布 v${CURRENT_VERSION}")
          fi

          if [ -z "$NOTES" ] || [ "$NOTES" = "## [Unreleased]" ]; then
            NOTES="## 更新内容\n\n- 版本更新至 ${CURRENT_VERSION}"
          fi

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo -e "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 检查标签是否存在
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: 创建发布版本
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: 发布 v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            .output/*.zip
          draft: false
          prerelease: ${{ github.ref != 'refs/heads/main' }}
          generate_release_notes: false

      - name: 发布摘要
        run: |
          echo "## 🎉 发布已创建" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **版本** | \`v${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **类型** | ${{ github.ref == 'refs/heads/main' && '正式版' || '预发布版' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 发布资源:" >> $GITHUB_STEP_SUMMARY
          ls -la .output/*.zip >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "未找到 zip 文件" >> $GITHUB_STEP_SUMMARY

  dependabot-notify:
    name: Dependabot通知
    runs-on: ubuntu-latest
    needs: [setup, lint, test, security, build, e2e]
    if: |
      github.event_name == 'pull_request' &&
      github.actor == 'dependabot[bot]' &&
      needs.lint.result == 'success' &&
      needs.test.result == 'success' &&
      needs.security.result == 'success' &&
      needs.build.result == 'success' &&
      (needs.e2e.result == 'success' || needs.e2e.result == 'skipped')
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: 添加待审核标签
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['待审核']
            })
            core.info('✅ 已添加待审核标签，等待人工审核后合并')
