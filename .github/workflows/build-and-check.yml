name: 构建与检查浏览器扩展

on:
  push:
    branches: [main, beta, release]
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches: [main, beta]
    paths-ignore:
      - "README.md"
      - "docs/**"
      - "LICENSE"
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "跳过 E2E 测试（加快构建速度）"
        required: false
        default: false
        type: boolean
      clear_caches:
        description: "清除旧的 npm 和 WXT 缓存后再构建"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || !contains(fromJSON('["main", "beta", "release"]'), github.ref_name) }}

permissions:
  contents: read

env:
  GET_ZIP_PATH: |
    get_zip_path() {
      local output_var="${1:-zip_path}"
      mapfile -t ZIP_FILES < <(find .output -name "*.zip" -type f | sort)
      if [ "${#ZIP_FILES[@]}" -ne 1 ]; then
        echo "❌ 期望恰好找到 1 个 zip 文件，实际为 ${#ZIP_FILES[@]}"
        printf '%s\n' "${ZIP_FILES[@]}"
        return 1
      fi
      local ZIP_PATH="${ZIP_FILES[0]}"
      echo "${output_var}=$ZIP_PATH" >> "$GITHUB_OUTPUT"
      echo "✅ zip 文件路径：$ZIP_PATH"
    }

jobs:
  get-env:
    name: 获取环境配置
    uses: ./.github/workflows/setup-env.yml
    permissions: {}

  setup:
    name: 准备环境
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [get-env]
    permissions:
      contents: read
      actions: write
    env:
      NODE_VERSION: ${{ needs.get-env.outputs.node_version }}
      PNPM_VERSION: ${{ needs.get-env.outputs.pnpm_version }}
      EXTENSION_SIZE_LIMIT_MB: ${{ needs.get-env.outputs.extension_size_limit_mb }}
    outputs:
      artifact_retention: ${{ steps.retention.outputs.days }}
      ref_slug: ${{ steps.ref-slug.outputs.value }}
      node_version: ${{ needs.get-env.outputs.node_version }}
      pnpm_version: ${{ needs.get-env.outputs.pnpm_version }}
      extension_size_limit_mb: ${{ needs.get-env.outputs.extension_size_limit_mb }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 生成分支标识
        id: ref-slug
        run: |
          REF_NAME='${{ github.ref_name }}'
          REF_SLUG=$(printf '%s' "$REF_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g; s/-\{2,\}/-/g; s/^-//; s/-$//')
          REF_HASH=$(printf '%s' "$REF_NAME" | sha256sum | cut -c1-8)
          echo "value=${REF_SLUG}-${REF_HASH}" >> $GITHUB_OUTPUT

      - name: 设置产物保留天数
        id: retention
        run: |
          if [[ "${{ github.ref_name }}" == "main" || "${{ github.ref_name }}" == "beta" || "${{ github.ref_name }}" == "release" ]]; then
            echo "days=30" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "days=14" >> $GITHUB_OUTPUT
          else
            echo "days=7" >> $GITHUB_OUTPUT
          fi

      - name: 清除当前分支旧缓存
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.clear_caches == 'true' }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branchPrefix = '${{ steps.ref-slug.outputs.value }}';
            const nodeVersion = '${{ env.NODE_VERSION }}';
            const prefixes = [
              '${{ runner.os }}-' + branchPrefix + '-node' + nodeVersion + '-',
              '${{ runner.os }}-' + branchPrefix + '-wxt-'
            ];
            let cachesCleared = 0;
            const cachesToDelete = [];

            console.log('🔍 正在清除当前分支相关缓存...');
            console.log('分支前缀: ' + branchPrefix);

            for (const prefix of prefixes) {
              let page = 1;
              const perPage = 100;

              while (true) {
                const { data: { actions_caches: caches } } = await github.rest.actions.getActionsCacheList({
                  owner,
                  repo,
                  per_page: perPage,
                  page: page
                });

                if (!caches || caches.length === 0) break;

                for (const cache of caches) {
                  if (cache.key.startsWith(prefix)) {
                    cachesToDelete.push({ id: cache.id, key: cache.key });
                  }
                }

                if (caches.length < perPage) break;
                page++;
              }
            }

            for (const cache of cachesToDelete) {
              console.log(`🗑️ 删除缓存: ${cache.key}`);
              try {
                await github.rest.actions.deleteActionsCacheById({
                  owner,
                  repo,
                  cache_id: cache.id
                });
                cachesCleared++;
              } catch (error) {
                console.error(`❌ 删除失败: ${error.message}`);
              }
            }

            console.log(`\n✅ 成功清除 ${cachesCleared} 个缓存`);

      - name: 输出准备摘要
        run: |
          echo "## 🚀 环境准备完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 配置项 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **分支** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **事件类型** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **分支标识** | \`${{ steps.ref-slug.outputs.value }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **产物保留** | ${{ steps.retention.outputs.days }} 天 |" >> $GITHUB_STEP_SUMMARY

  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup]
    permissions:
      contents: read
    env:
      NODE_VERSION: ${{ needs.setup.outputs.node_version }}
      PNPM_VERSION: ${{ needs.setup.outputs.pnpm_version }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 安装项目依赖
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: 显示 TypeScript 版本
        run: pnpm exec tsc --version

      - name: 生成 WXT 类型定义
        run: pnpm wxt prepare

      - name: TypeScript 类型检查
        id: typecheck
        run: pnpm exec tsc --noEmit

      - name: ESLint 代码检查
        id: eslint
        run: pnpm run lint

      - name: Prettier 格式检查
        id: prettier
        run: pnpm run format:check

      - name: 输出检查摘要
        if: always()
        run: |
          typecheck_status="${{ steps.typecheck.outcome }}"
          eslint_status="${{ steps.eslint.outcome }}"
          prettier_status="${{ steps.prettier.outcome }}"

          to_label() {
            if [ "$1" = "success" ]; then
              echo "✅ 通过"
            elif [ "$1" = "failure" ]; then
              echo "❌ 失败"
            else
              echo "⚠️ $1"
            fi
          }

          echo "## 🔍 代码检查结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 检查项 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :---: |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript 类型检查 | $(to_label "$typecheck_status") |" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint 代码检查 | $(to_label "$eslint_status") |" >> $GITHUB_STEP_SUMMARY
          echo "| Prettier 格式检查 | $(to_label "$prettier_status") |" >> $GITHUB_STEP_SUMMARY

  test:
    name: 单元测试
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup]
    permissions:
      contents: read
    env:
      NODE_VERSION: ${{ needs.setup.outputs.node_version }}
      PNPM_VERSION: ${{ needs.setup.outputs.pnpm_version }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: 安装项目依赖
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: 运行单元测试并生成覆盖率报告
        run: pnpm run test:coverage

      - name: 上传覆盖率到 Codecov
        if: success() || failure()
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: 安全扫描
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [setup]
    permissions:
      contents: read
      security-events: write
    env:
      NODE_VERSION: ${{ needs.setup.outputs.node_version }}
      PNPM_VERSION: ${{ needs.setup.outputs.pnpm_version }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: 安装项目依赖
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: 检查密钥泄露
        uses: trufflesecurity/trufflehog@6c05c4a00b91aa542267d8e32a8254774799d68d # v3.93.8
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

      - name: 依赖安全审计
        id: audit
        continue-on-error: true
        run: |
          echo "### 🛡️ 依赖安全审计" >> $GITHUB_STEP_SUMMARY

          AUDIT_EXIT_CODE=0
          AUDIT_OUTPUT=$(pnpm audit --audit-level=moderate 2>&1) || AUDIT_EXIT_CODE=$?

          echo "<details><summary>点击查看完整审计报告</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$AUDIT_OUTPUT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

          if [ $AUDIT_EXIT_CODE -eq 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ 未发现安全漏洞" >> $GITHUB_STEP_SUMMARY
            echo "audit_status=clean" >> $GITHUB_OUTPUT
          else
            if echo "$AUDIT_OUTPUT" | grep -qiE "(registry|network|ECONNRESET|ETIMEDOUT|ENOTFOUND|5[0-9]{2})"; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "❌ **审计失败：无法连接到包注册表**" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "可能是临时网络问题或 registry 故障，请重试或等待后再次运行。" >> $GITHUB_STEP_SUMMARY
              echo "audit_status=registry_error" >> $GITHUB_OUTPUT
              echo "::warning::安全审计失败：无法连接到包注册表，请重试"
            else
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "⚠️ **发现安全漏洞！** 请查看上方审计报告并修复。" >> $GITHUB_STEP_SUMMARY
              echo "audit_status=warning" >> $GITHUB_OUTPUT
              echo "::error::发现安全漏洞，请查看审计报告并修复"
            fi
          fi

      - name: 汇总安全审计结果
        if: always()
        run: |
          AUDIT_STATUS="${{ steps.audit.outputs.audit_status }}"
          if [ "$AUDIT_STATUS" != "clean" ] && [ "$AUDIT_STATUS" != "registry_error" ]; then
            echo "❌ 安全审计发现漏洞"
            exit 1
          fi
          if [ "$AUDIT_STATUS" = "registry_error" ]; then
            echo "⚠️ 安全审计因网络问题失败，请考虑重试"
          fi

      - name: 安全模式检查
        run: |
          echo "### 🔍 安全模式检查" >> $GITHUB_STEP_SUMMARY
          EXIT_CODE=0

          echo "#### eval 使用检查" >> $GITHUB_STEP_SUMMARY
          if grep -rPn '\beval\s*\(' --include="*.ts" --include="*.tsx" --include="*.js" . 2>/dev/null | \
             grep -v '/node_modules/' | \
             grep -v '/\.wxt/' | \
             grep -vP '^[^:]+:\d+:\s*//' | \
             grep -v "// safe:" | \
             grep -v "// eslint-disable"; then
            echo "❌ 发现 eval() 使用 - 潜在安全风险" >> $GITHUB_STEP_SUMMARY
            EXIT_CODE=1
          else
            echo "✅ 未发现 eval() 使用" >> $GITHUB_STEP_SUMMARY
          fi

          echo "#### dangerouslySetInnerHTML 检查" >> $GITHUB_STEP_SUMMARY
          if grep -r "dangerouslySetInnerHTML" --include="*.ts" --include="*.tsx" --include="*.js" . 2>/dev/null | \
             grep -v '/node_modules/' | \
             grep -v '/\.wxt/'; then
            echo "⚠️ 发现 dangerouslySetInnerHTML 使用 - XSS 风险" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ 未发现 dangerouslySetInnerHTML 使用" >> $GITHUB_STEP_SUMMARY
          fi

          exit $EXIT_CODE

  build:
    name: 构建扩展
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [setup, lint, test]
    permissions:
      contents: read
    env:
      NODE_VERSION: ${{ needs.setup.outputs.node_version }}
      PNPM_VERSION: ${{ needs.setup.outputs.pnpm_version }}
      EXTENSION_SIZE_LIMIT_MB: ${{ needs.setup.outputs.extension_size_limit_mb }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      name: ${{ steps.version.outputs.name }}
      zip_path: ${{ steps.zip-info.outputs.zip_path }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 安装项目依赖
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: 缓存 WXT 构建缓存
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: .wxt
          key: ${{ runner.os }}-${{ needs.setup.outputs.ref_slug }}-wxt-${{ hashFiles('**/pnpm-lock.yaml', 'src/entrypoints/**/*', 'src/components/**/*', 'src/hooks/**/*', 'src/i18n/**/*', 'src/lib/**/*', 'src/types/**/*', 'src/utils/**/*', 'public/**/*', 'wxt.config.ts', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ needs.setup.outputs.ref_slug }}-wxt-
            ${{ runner.os }}-wxt-

      - name: 构建扩展
        run: |
          set -e
          echo "🔨 开始构建..."
          pnpm run build 2>&1
          echo "✅ 构建命令完成"

          echo "📁 构建后检查 .output/ 目录:"
          if [ -d ".output" ]; then
            ls -la .output/
          else
            echo "❌ .output/ 目录不存在"
            echo "📁 当前目录内容:"
            ls -la
            exit 1
          fi

      - name: 获取版本信息
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          NAME=$(jq -r '.name' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: 检查扩展体积
        run: |
          BUILD_DIR=".output/chrome-mv3"
          if [ ! -d "$BUILD_DIR" ]; then
            echo "❌ 构建目录不存在: $BUILD_DIR"
            echo "📁 当前目录内容:"
            ls -la
            echo "📁 .output/ 目录内容:"
            ls -la .output/ 2>/dev/null || echo ".output/ 目录不存在"
            exit 1
          fi

          SIZE_KB=$(du -sk "$BUILD_DIR" | cut -f1)
          MAX_SIZE_KB=$((${{ env.EXTENSION_SIZE_LIMIT_MB }} * 1024))
          echo "📊 扩展体积: ${SIZE_KB}KB (限制: ${MAX_SIZE_KB}KB)"

          if [ "$SIZE_KB" -gt "$MAX_SIZE_KB" ]; then
            echo "❌ 扩展体积 (${SIZE_KB}KB) 超出限制 (${MAX_SIZE_KB}KB)"
            exit 1
          fi
          echo "✅ 扩展体积符合限制"

      - name: 验证构建产物
        run: |
          BUILD_DIR=".output/chrome-mv3"

          if [ ! -d "$BUILD_DIR" ]; then
            echo "❌ 构建目录不存在: $BUILD_DIR"
            exit 1
          fi

          echo "📁 构建内容:"
          ls -la "$BUILD_DIR"

          REQUIRED_FILES=("manifest.json" "popup.html")
          for file in "${REQUIRED_FILES[@]}"; do
            if [ -f "$BUILD_DIR/$file" ]; then
              echo "✅ $file 存在"
            else
              echo "❌ $file 缺失"
              exit 1
            fi
          done

          if [ -f "$BUILD_DIR/manifest.json" ]; then
            echo "📄 Manifest 内容:"
            jq '.' "$BUILD_DIR/manifest.json"
          fi

      - name: 打包扩展
        run: |
          echo "=========================================="
          echo "📦 开始打包扩展"
          echo "=========================================="
          echo "📁 打包前 .output/ 目录内容:"
          ls -la .output/

          echo ""
          echo "🔨 运行 pnpm run zip..."
          pnpm run zip

          echo ""
          echo "📁 打包后 .output/ 目录内容 (递归):"
          ls -laR .output/ || true

          echo ""
          echo "🔍 查找生成的 zip 文件 (整个项目):"
          find . -name "*.zip" -type f 2>/dev/null | head -20

          ZIP_COUNT=$(find .output -name "*.zip" -type f 2>/dev/null | wc -l)
          echo "📊 在 .output/ 中找到 $ZIP_COUNT 个 zip 文件"

          if [ "$ZIP_COUNT" -eq 0 ]; then
            echo "❌ pnpm run zip 执行完成，但未生成 zip 文件"
            exit 1
          fi

          echo ""
          echo "🔍 最终 zip 文件列表:"
          find .output -name "*.zip" -type f -exec ls -la {} \;

          echo ""
          # 验证 zip 文件是否存在
          FINAL_ZIP_COUNT=$(find .output -name "*.zip" -type f 2>/dev/null | wc -l)
          if [ "$FINAL_ZIP_COUNT" -eq 0 ]; then
            echo "❌ 最终验证失败：仍然没有找到 zip 文件"
            exit 1
          fi

          echo "✅ zip 文件验证成功，找到 $FINAL_ZIP_COUNT 个文件"

      - name: 获取 zip 文件路径
        id: zip-info
        run: |
          eval "$GET_ZIP_PATH"
          get_zip_path "zip_path"

      - name: 上传构建产物
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: extension-build-${{ steps.version.outputs.version }}-${{ github.run_id }}
          path: .output/chrome-mv3/
          retention-days: ${{ needs.setup.outputs.artifact_retention }}
          if-no-files-found: error

      - name: 验证 zip 文件存在后上传
        run: |
          echo "🔍 验证 zip 文件是否存在..."
          ls -la "${{ steps.zip-info.outputs.zip_path }}"
          if [ ! -f "${{ steps.zip-info.outputs.zip_path }}" ]; then
            echo "❌ zip 文件不存在: ${{ steps.zip-info.outputs.zip_path }}"
            exit 1
          fi
          echo "✅ zip 文件存在：${{ steps.zip-info.outputs.zip_path }}"

      - name: 上传打包产物
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: extension-zip-${{ steps.version.outputs.version }}-${{ github.run_id }}
          path: ${{ steps.zip-info.outputs.zip_path }}
          retention-days: ${{ needs.setup.outputs.artifact_retention }}
          if-no-files-found: error

      - name: 输出构建摘要
        run: |
          echo "## 📦 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **版本** | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **名称** | \`${{ steps.version.outputs.name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **产物保留** | ${{ needs.setup.outputs.artifact_retention }} 天 |" >> $GITHUB_STEP_SUMMARY

  e2e:
    name: E2E测试
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup, build]
    permissions:
      contents: read
    env:
      NODE_VERSION: ${{ needs.setup.outputs.node_version }}
      PNPM_VERSION: ${{ needs.setup.outputs.pnpm_version }}
    if: needs.build.result == 'success' && github.event.inputs.skip_tests != 'true'
    steps:
      - name: 检出仓库
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 安装项目依赖
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: 列出可用 Artifacts
        run: |
          echo "📦 尝试下载 artifact: extension-build"
          echo "🔍 工作流运行 ID: ${{ github.run_id }}"

      - name: 下载构建产物
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: extension-build-${{ needs.build.outputs.version }}-${{ github.run_id }}
          path: .output/chrome-mv3/

      - name: 准备测试扩展
        run: |
          echo "📁 当前目录内容:"
          ls -la

          echo "📁 .output/ 目录内容:"
          ls -la .output/ || echo "目录为空或不存在"

          if [ -d ".output/chrome-mv3" ] && [ -f ".output/chrome-mv3/manifest.json" ]; then
            echo "✅ 找到构建目录: .output/chrome-mv3"
          else
            echo "❌ 未找到构建产物，检查所有目录..."
            find . -name "manifest.json" -type f 2>/dev/null | head -5
            echo "📁 当前目录完整内容:"
            ls -laR
            exit 1
          fi

          echo "📁 最终 .output/chrome-mv3/ 目录内容:"
          ls -la .output/chrome-mv3/

      - name: 安装 Playwright 浏览器
        run: pnpm exec playwright install --with-deps chromium

      - name: 运行 E2E 测试
        run: xvfb-run --auto-servernum pnpm run test:e2e

      - name: 上传 Playwright 报告
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: ${{ needs.setup.outputs.artifact_retention }}

  pr-comment:
    name: PR评论
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [setup, lint, test, security, build, e2e]
    if: >
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: 检出仓库
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 获取版本信息
        id: info
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 检查是否为 Dependabot PR
        id: dependabot
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            echo "is_dependabot=true" >> $GITHUB_OUTPUT
          else
            echo "is_dependabot=false" >> $GITHUB_OUTPUT
          fi

      - name: 创建 PR 评论
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const setupResult = '${{ needs.setup.result }}';
            const lintResult = '${{ needs.lint.result }}';
            const testResult = '${{ needs.test.result }}';
            const securityResult = '${{ needs.security.result }}';
            const buildResult = '${{ needs.build.result }}';
            const e2eResult = '${{ needs.e2e.result }}';
            const version = '${{ steps.info.outputs.version }}';
            const isDependabot = '${{ steps.dependabot.outputs.is_dependabot }}' === 'true';

            const statusEmoji = (result) => {
              if (result === 'success') return '✅';
              if (result === 'failure') return '❌';
              if (result === 'skipped') return '⏭️';
              return '⚠️';
            };

            const statusColor = (result) => {
              if (result === 'success') return 'brightgreen';
              if (result === 'failure') return 'red';
              return 'yellow';
            };

            const getBadge = (label, result) => {
              const color = statusColor(result);
              return `![${label}](https://img.shields.io/badge/${encodeURIComponent(label)}-${result}-${color}?style=flat-square)`;
            };

            let body = `## 🛠️ 扩展构建仪表盘\n\n`;
            body += `> **版本:** \`${version}\` | **分支:** \`${{ github.ref_name }}\` | **运行 ID:** [#${{ github.run_number }}](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})\n\n`;

            body += `### 📊 检查结果概览\n\n`;
            body += `| 阶段 | 检查项 | 状态 | 说明 |\n`;
            body += `| :---: | :--- | :---: | :--- |\n`;
            body += `| 🚀 | **环境准备** | ${statusEmoji(setupResult)} | 缓存与产物配置 |\n`;
            body += `| 🔍 | **代码检查** | ${statusEmoji(lintResult)} | TypeScript + ESLint + Prettier |\n`;
            body += `| 🧪 | **单元测试** | ${statusEmoji(testResult)} | Node.js ${{ needs.setup.outputs.node_version }} 测试 |\n`;
            body += `| 🛡️ | **安全扫描** | ${statusEmoji(securityResult)} | 密钥泄露 + 依赖审计 |\n`;
            body += `| 📦 | **扩展构建** | ${statusEmoji(buildResult)} | WXT 生产构建 |\n`;
            body += `| 🎭 | **E2E 测试** | ${statusEmoji(e2eResult)} | Playwright 浏览器测试 |\n\n`;

            body += `### 🏷️ 状态徽章\n\n`;
            body += `${getBadge('代码检查', lintResult)} ${getBadge('单元测试', testResult)} ${getBadge('安全扫描', securityResult)} ${getBadge('构建', buildResult)} ${getBadge('E2E测试', e2eResult)}\n\n`;

            const results = {
              setup: setupResult,
              lint: lintResult,
              test: testResult,
              security: securityResult,
              build: buildResult
            };

            const allSuccess = ['setup', 'lint', 'test', 'security', 'build'].every(r =>
              results[r] === 'success'
            );
            const e2eSuccess = e2eResult === 'success' || e2eResult === 'skipped';

            if (allSuccess && e2eSuccess) {
              body += `> 🎉 **所有检查已通过！** 代码已准备好合并。\n\n`;
            } else {
              body += `> ⚠️ **部分检查未通过**，请查看上方详情或检查日志。\n\n`;
            }

            if (buildResult === 'success') {
              body += `---\n\n`;
              body += `### 📥 下载构建产物\n\n`;
              body += `构建产物可在 [工作流运行页面](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) 的 **Artifacts** 区域下载。\n\n`;
            }

            if (isDependabot) {
              body += `---\n\n`;
              body += `### 🤖 Dependabot 依赖更新\n\n`;
              if (allSuccess && e2eSuccess) {
                body += `✅ 所有关键检查已通过，已添加 \`待审核\` 标签。\n\n`;
                body += `⚠️ **需要人工审核后才能合并到主分支！**\n`;
              } else {
                body += `⚠️ 部分检查未通过，需要人工审核。\n`;
              }
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });

            const botComment = comments.find(comment =>
              comment.user.login === 'github-actions[bot]' &&
              comment.body.includes('## 🛠️ 扩展构建仪表盘')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  notify-failure:
    name: 失败通知
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [setup, lint, test, security, build, e2e]
    if: failure() && github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - name: 创建失败摘要
        run: |
          echo "## ❌ 构建失败" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 阶段 | 任务 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "| :---: | :--- | :---: |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 | 环境准备 | ${{ needs.setup.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 | 代码检查 | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 | 单元测试 | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛡️ | 安全扫描 | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 | 构建 | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎭 | E2E 测试 | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "请查看 [工作流日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) 了解详情。" >> $GITHUB_STEP_SUMMARY

  dependabot-notify:
    name: Dependabot通知
    runs-on: ubuntu-latest
    needs: [setup, lint, test, security, build, e2e]
    if: >
      github.event_name == 'pull_request' &&
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.lint.result == 'success' &&
      needs.test.result == 'success' &&
      needs.security.result == 'success' &&
      needs.build.result == 'success' &&
      (needs.e2e.result == 'success' || needs.e2e.result == 'skipped')
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: 添加待审核标签
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['待审核']
            })
            core.info('✅ 已添加待审核标签，等待人工审核后合并')
