name: 设置构建环境

# GitHub Actions 的统一环境配置入口。
# 如需升级 Bun 或扩展体积限制，请只修改此文件。
# 其他工作流通过 workflow_call 读取这里的输出，避免多处手动同步。

on:
  workflow_call:
    outputs:
      bun_version:
        description: Bun 版本
        value: ${{ jobs.setup.outputs.bun_version }}
      extension_size_limit_mb:
        description: 扩展体积限制 (MB)
        value: ${{ jobs.setup.outputs.extension_size_limit_mb }}

jobs:
  setup:
    name: 设置环境变量
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      bun_version: ${{ steps.set-vars.outputs.bun_version }}
      extension_size_limit_mb: ${{ steps.set-vars.outputs.extension_size_limit_mb }}
    steps:
      - name: 设置环境变量
        id: set-vars
        run: |
          echo "bun_version=1.3.13" >> $GITHUB_OUTPUT
          echo "extension_size_limit_mb=10" >> $GITHUB_OUTPUT
