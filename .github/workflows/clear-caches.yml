name: 清除 GitHub Actions 缓存

on:
  workflow_dispatch:
    inputs:
      cache_prefix:
        description: "要清除的缓存前缀（留空则清除所有）"
        required: false
        type: string
        default: ""

permissions:
  actions: write
  contents: read

jobs:
  clear-caches:
    name: 清除缓存
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 清除缓存
        uses: actions/github-script@v8
        with:
          script: |
            const prefix = '${{ inputs.cache_prefix }}';
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            console.log(`正在获取仓库 ${owner}/${repo} 的缓存列表...`);

            let cachesCleared = 0;
            let page = 1;
            const perPage = 100;

            while (true) {
              const { data: { actions_caches: caches } } = await github.rest.actions.getActionsCacheList({
                owner,
                repo,
                per_page: perPage,
                page: page
              });
              
              if (!caches || caches.length === 0) {
                break;
              }
              
              for (const cache of caches) {
                const shouldDelete = !prefix || cache.key.startsWith(prefix);
                
                if (shouldDelete) {
                  console.log(`删除缓存: ${cache.key} (ID: ${cache.id})`);
                  try {
                    await github.rest.actions.deleteActionsCacheById({
                      owner,
                      repo,
                      cache_id: cache.id
                    });
                    cachesCleared++;
                  } catch (error) {
                    console.error(`删除缓存 ${cache.key} 失败:`, error.message);
                  }
                }
              }
              
              if (caches.length < perPage) {
                break;
              }
              page++;
            }

            console.log(`\n✅ 成功清除了 ${cachesCleared} 个缓存`);

            if (prefix) {
              console.log(`🔍 筛选前缀: "${prefix}"`);
            } else {
              console.log(`🔍 清除了所有缓存`);
            }

            core.setOutput('caches_cleared', cachesCleared);
