      - name: "åˆ›å»º PR è¯„è®º"
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const auditStatus = '${{ steps.audit.outputs.audit_status }}';
            const licenseStatus = '${{ steps.license.outputs.license_status }}';
            const depSize = '${{ steps.size.outputs.size }}';
            const depCount = '${{ steps.size.outputs.count }}';

            const statusEmoji = (status) => {
              if (status === 'clean' || status === 'ok') return 'âœ…';
              if (status === 'warning' || status === 'violation') return 'âš ï¸';
              return 'â“';
            };

            const body = `## ğŸ” ä¾èµ–å®¡æŸ¥æ‘˜è¦

            | æ£€æŸ¥é¡¹ | çŠ¶æ€ | è¯¦æƒ… |
            |-------|--------|---------|
            | å®‰å…¨å®¡è®¡ | ${statusEmoji(auditStatus)} | ${auditStatus === 'clean' ? 'æ— æ¼æ´' : 'éœ€è¦å®¡æŸ¥'} |
            | è®¸å¯è¯æ£€æŸ¥ | ${statusEmoji(licenseStatus)} | ${licenseStatus === 'ok' ? 'åˆè§„' : 'æ£€æµ‹åˆ°è¿è§„'} |
            | ä¾èµ–ä¿¡æ¯ | ğŸ“¦ | ${depCount} ä¸ªç›´æ¥ä¾èµ–ï¼Œæ€»ä½“ç§¯ ${depSize} |

            ${auditStatus === 'warning' || licenseStatus === 'violation' ? 'âš ï¸ **éœ€è¦å¤„ç†**ï¼šè¯·æŸ¥çœ‹ [å·¥ä½œæµæ‘˜è¦](' + process.env.GITHUB_SERVER_URL + '/' + process.env.GITHUB_REPOSITORY + '/actions/runs/' + process.env.GITHUB_RUN_ID + ') ä¸­çš„å®¡è®¡ç»“æœã€‚' : ''}
            `;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
