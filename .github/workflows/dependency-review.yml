permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: "æ£€å‡ºä»£ç åº“"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: "è®¾ç½® Node.js ç¯å¢ƒ"
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "20"

      - name: "ä¾èµ–å®¡æŸ¥"
        uses: actions/dependency-review-action@05fe4576374b728f0c523d6a13d64c25081e0803 # v4.8.3
        with:
          comment-summary-in-pr: always
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "å®‰è£…ä¾èµ–"
        run: npm ci

      - name: "å®‰å…¨å®¡è®¡"
        id: audit
        run: |
          echo "## ğŸ”’ å®‰å…¨å®¡è®¡æŠ¥å‘Š" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          AUDIT_EXIT_CODE=0
          AUDIT_OUTPUT=$(npm audit --audit-level=moderate 2>&1) || AUDIT_EXIT_CODE=$?

          if [ $AUDIT_EXIT_CODE -eq 0 ]; then
            echo "âœ… æœªå‘ç°å·²çŸ¥æ¼æ´" >> $GITHUB_STEP_SUMMARY
            echo "audit_status=clean" >> $GITHUB_OUTPUT
          else
            echo "âš ï¸ å‘ç°æ¼æ´ï¼š" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$AUDIT_OUTPUT" | head -50 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "::warning::å‘ç°å®‰å…¨æ¼æ´ï¼Œè¯·æŸ¥çœ‹å®¡è®¡æŠ¥å‘Šå¹¶ä¿®å¤"
            echo "audit_status=warning" >> $GITHUB_OUTPUT
          fi

      - name: "è®¸å¯è¯æ£€æŸ¥"
        id: license
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ğŸ“œ è®¸å¯è¯åˆè§„æ£€æŸ¥" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          npm install -g license-checker-rseidelsohn

          echo "### ğŸ“Š è®¸å¯è¯æ‘˜è¦" >> $GITHUB_STEP_SUMMARY
          license-checker-rseidelsohn --summary >> $GITHUB_STEP_SUMMARY

          FORBIDDEN_LICENSES="GPL-2.0-only,GPL-2.0-or-later,GPL-3.0-only,GPL-3.0-or-later,AGPL-3.0-only,AGPL-3.0-or-later,LGPL-2.0-only,LGPL-2.0-or-later,LGPL-2.1-only,LGPL-2.1-or-later,LGPL-3.0-only,LGPL-3.0-or-later"

          if license-checker-rseidelsohn --failOn "$FORBIDDEN_LICENSES" 2>&1; then
            echo "âœ… æ‰€æœ‰ä¾èµ–å‡ç¬¦åˆè®¸å¯è¯æ”¿ç­–ã€‚" >> $GITHUB_STEP_SUMMARY
            echo "license_status=ok" >> $GITHUB_OUTPUT
          else
            echo "âŒ **æ£€æµ‹åˆ°è®¸å¯è¯è¿è§„ï¼**" >> $GITHUB_STEP_SUMMARY
            echo "ä»¥ä¸‹åŒ…ä½¿ç”¨äº†å—é™è®¸å¯è¯ï¼ˆGPL/AGPL/LGPLï¼‰ï¼Œä¸éšç§ä¼˜å…ˆç­–ç•¥å†²çªï¼š" >> $GITHUB_STEP_SUMMARY
            license-checker-rseidelsohn --failOn "$FORBIDDEN_LICENSES" >> $GITHUB_STEP_SUMMARY 2>&1 || true
            echo "license_status=violation" >> $GITHUB_OUTPUT
            echo ""
            echo "::error::æ£€æµ‹åˆ°è®¸å¯è¯è¿è§„ï¼Œå­˜åœ¨ GPL/AGPL/LGPL ä¾èµ–ï¼Œè¯·æ£€æŸ¥å¹¶ç§»é™¤"
            exit 1
          fi

      - name: "ä¾èµ–ä½“ç§¯æ£€æŸ¥"
        id: size
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ğŸ“¦ ä¾èµ–ä½“ç§¯åˆ†æ" >> $GITHUB_STEP_SUMMARY
