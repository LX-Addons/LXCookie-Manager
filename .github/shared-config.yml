# 依赖审查工具版本
LICENSE_CHECKER_VERSION: "4.4.2"

# Node.js 版本 - 所有工作流统一使用
NODE_VERSION: "24"

# pnpm 版本 - 所有工作流统一使用
PNPM_VERSION: "10.32.1"

# 扩展体积限制 (MB)
EXTENSION_SIZE_LIMIT_MB: "10"

# =============================================================================
# 需要同步修改的文件位置：
# =============================================================================
# .github/workflows/setup-env.yml
