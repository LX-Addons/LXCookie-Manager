# ⚠️ 重要提示：此文件仅作为文档参考，GitHub Actions 不会自动读取它！
#
# 当前工作流已统一通过 `.github/workflows/setup-env.yml` 输出这些值。
# 如需更新版本，请同时修改：
#   1. .github/workflows/setup-env.yml
#   2. 此文件（作为文档参考）
